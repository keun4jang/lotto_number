name: Weekly Lotto Recommendation

on:
  schedule:
    # Friday 09:00 KST = Thursday 00:00 UTC
    - cron: "0 0 * * 5"
  workflow_dispatch:

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: lotto-doctor
        run: pip install -e .

      - name: Collect latest draw data
        working-directory: lotto-doctor
        run: lotto-doctor collect --source github || echo "수집 실패"

      - name: Generate and send recommendation
        working-directory: lotto-doctor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: lotto-doctor recommend --send

      - name: Commit reports and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lotto-doctor/reports/ lotto-doctor/data/
          git diff --cached --quiet || git commit -m "chore: weekly recommendation $(date -u +%Y-%m-%d)"
          git push
