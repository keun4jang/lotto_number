name: Weekly Pension Lottery 720+ Recommendation

on:
  schedule:
    # 연금복권720+ 추첨일: 목요일 → 전날(수요일)에 09:00, 16:00 KST 하루 2회 발송
    - cron: "0 0 * * 3"  # 수요일 09:00 KST
    - cron: "0 7 * * 3"  # 수요일 16:00 KST
  workflow_dispatch:

jobs:
  pension-recommend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: lotto-doctor
        run: pip install -e .

      - name: Auto-collect latest pension draw result (news cross-check)
        working-directory: lotto-doctor
        run: lotto-doctor pension collect-auto || echo "자동 수집 실패 - 기존 데이터로 진행"

      - name: Backfill pension history if data is sparse (reliability bootstrap)
        working-directory: lotto-doctor
        run: |
          COUNT=$(python3 -c "
import sqlite3
try:
    conn = sqlite3.connect('data/lotto.db')
    print(conn.execute('SELECT COUNT(*) FROM pension_draws').fetchone()[0])
except Exception:
    print(0)
")
          echo "현재 연금복권 회차 수: $COUNT"
          if [ "$COUNT" -lt 15 ]; then
            lotto-doctor pension backfill --count 30 --delay 1.0 || echo "백필 실패 - 기존 데이터로 진행"
          fi

      - name: Generate and send pension recommendation
        working-directory: lotto-doctor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: lotto-doctor pension recommend --send

      - name: Commit DB and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f lotto-doctor/data/lotto.db
          if git diff --cached --quiet; then
            echo "변경 없음, 커밋 건너뜀."
          else
            git commit -m "chore: pension weekly recommendation $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main
          fi
