name: Weekly Lotto Result Check

on:
  schedule:
    # Sunday 09:00 KST = Sunday 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  check-result:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: lotto-doctor
        run: pip install -e .

      - name: Collect latest draw data
        working-directory: lotto-doctor
        run: lotto-doctor collect --source github || echo "수집 실패"

      - name: Check results and send via Telegram
        working-directory: lotto-doctor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: lotto-doctor check-result --send

      - name: Commit reports and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lotto-doctor/reports/ lotto-doctor/data/
          git diff --cached --quiet || git commit -m "chore: weekly result check $(date -u +%Y-%m-%d)"
          git push
