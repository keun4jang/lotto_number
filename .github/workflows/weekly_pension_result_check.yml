name: Weekly Pension Lottery 720+ Result Check

on:
  schedule:
    # 연금복권720+ 추첨일: 목요일 → 다음날(금요일) 09:00 KST 결과 확인
    - cron: "0 0 * * 5"  # 금요일 09:00 KST
  workflow_dispatch:

jobs:
  pension-check-result:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: lotto-doctor
        run: pip install -e .

      - name: Auto-collect latest pension draw result (news cross-check)
        working-directory: lotto-doctor
        run: lotto-doctor pension collect-auto

      - name: Check pension recommendation result
        working-directory: lotto-doctor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: lotto-doctor pension check-result --send

      - name: Commit DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f lotto-doctor/data/lotto.db
          if git diff --cached --quiet; then
            echo "변경 없음, 커밋 건너뜀."
          else
            git commit -m "chore: pension weekly result check $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main
          fi
